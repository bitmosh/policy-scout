version: 1

# Secret pattern registry for Policy Scout secret scanning.
# Each entry defines a regex pattern for a known credential format.
# Optional fields: entropy_min (float), context_pattern (regex string).

patterns:
  - id: aws_access_key
    service: AWS
    pattern: '\bAKIA[0-9A-Z]{16}\b'
    severity: critical
    guidance: "Rotate immediately at https://console.aws.amazon.com/iam/ — assume compromised if in any committed history."

  - id: aws_secret_key
    service: AWS
    pattern: '(?<![A-Za-z0-9/+])[A-Za-z0-9/+]{40}(?![A-Za-z0-9/+])'
    severity: critical
    entropy_min: 4.5
    context_pattern: '(?i)(aws_secret|AWS_SECRET_ACCESS_KEY|aws_secret_access_key)'
    guidance: "Rotate the associated AWS Access Key ID immediately."

  - id: github_token_classic
    service: GitHub
    pattern: '\bghp_[a-zA-Z0-9]{36}\b'
    severity: critical
    guidance: "Revoke at https://github.com/settings/tokens"

  - id: github_token_fine_grained
    service: GitHub
    pattern: '\bgithub_pat_[a-zA-Z0-9_]{82}\b'
    severity: critical
    guidance: "Revoke at https://github.com/settings/personal-access-tokens"

  - id: github_oauth
    service: GitHub
    pattern: '\bgho_[a-zA-Z0-9]{36}\b'
    severity: critical
    guidance: "Revoke at https://github.com/settings/applications"

  - id: github_actions_token
    service: GitHub
    pattern: '\bghs_[a-zA-Z0-9]{36}\b'
    severity: critical
    guidance: "GitHub Actions tokens are short-lived but may expose repo permissions. Review workflow logs."

  - id: npm_token
    service: npm
    pattern: '\bnpm_[a-zA-Z0-9]{36}\b'
    severity: critical
    guidance: "Revoke at https://www.npmjs.com/settings/<username>/tokens"

  - id: stripe_live_key
    service: Stripe
    pattern: '\bsk_live_[a-zA-Z0-9]{24,}\b'
    severity: critical
    guidance: "Rotate at https://dashboard.stripe.com/apikeys — if exposed, review recent charges."

  - id: stripe_test_key
    service: Stripe
    pattern: '\bsk_test_[a-zA-Z0-9]{24,}\b'
    severity: medium
    guidance: "Test key — rotate at https://dashboard.stripe.com/apikeys. Not a live risk but indicates key management needs review."

  - id: stripe_restricted_key
    service: Stripe
    pattern: '\brk_live_[a-zA-Z0-9]{24,}\b'
    severity: critical
    guidance: "Restricted live key — rotate at https://dashboard.stripe.com/apikeys"

  - id: sendgrid_key
    service: SendGrid
    pattern: '\bSG\.[a-zA-Z0-9_\-]{22}\.[a-zA-Z0-9_\-]{43}\b'
    severity: critical
    guidance: "Revoke at https://app.sendgrid.com/settings/api_keys"

  - id: private_key_pem
    service: generic
    pattern: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
    severity: critical
    guidance: "Private key — determine usage (SSH, TLS, signing) and rotate the associated public key/certificate."

  - id: slack_token
    service: Slack
    pattern: '\bxox[baprs]-[0-9a-zA-Z]{10,48}\b'
    severity: critical
    guidance: "Revoke at https://api.slack.com/apps — xoxb=bot token, xoxa=app token, xoxp=user token."

  - id: slack_webhook
    service: Slack
    pattern: 'https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'
    severity: high
    guidance: "Regenerate the webhook URL in your Slack app settings."

  - id: gcp_service_account
    service: GCP
    pattern: '"type":\s*"service_account"'
    severity: critical
    guidance: "GCP service account key — revoke at https://console.cloud.google.com/iam-admin/serviceaccounts and generate a new key."

  - id: google_api_key
    service: Google
    pattern: '\bAIza[0-9A-Za-z_\-]{35}\b'
    severity: high
    guidance: "Restrict or rotate at https://console.cloud.google.com/apis/credentials"

  - id: heroku_api_key
    service: Heroku
    pattern: '\b[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}\b'
    severity: medium
    entropy_min: 3.5
    context_pattern: '(?i)(heroku|HEROKU_API_KEY)'
    guidance: "Revoke at https://dashboard.heroku.com/account"

  - id: twilio_account_sid
    service: Twilio
    pattern: '\bAC[0-9a-fA-F]{32}\b'
    severity: high
    guidance: "Rotate at https://console.twilio.com — review call/SMS logs if exposed."

  - id: twilio_auth_token
    service: Twilio
    pattern: '\b[0-9a-fA-F]{32}\b'
    severity: high
    entropy_min: 3.8
    context_pattern: '(?i)(twilio|TWILIO_AUTH_TOKEN|auth_token)'
    guidance: "Rotate auth token at https://console.twilio.com"

  - id: jwt_token
    service: generic
    pattern: '\beyJ[a-zA-Z0-9_\-]+\.[a-zA-Z0-9_\-]+\.[a-zA-Z0-9_\-]+\b'
    severity: high
    guidance: "JWT token — identify the issuer and revoke/rotate if long-lived."

  - id: generic_api_key
    service: generic
    pattern: '(?i)(?:api[_\-]?key|apikey|api[_\-]?secret)\s*[:=]\s*["\x27]?([a-zA-Z0-9_\-]{20,})["\x27]?'
    severity: high
    entropy_min: 3.5
    guidance: "Identify the service and rotate the key."

  - id: env_assignment_secret
    service: generic
    pattern: '(?i)(?:password|passwd|secret|token|credential|auth_key)\s*=\s*["\x27]([^"\x27\s]{8,})["\x27]'
    severity: high
    entropy_min: 3.0
    guidance: "Review the assignment context — if this is a real credential, rotate it immediately."

  - id: private_key_header
    service: generic
    pattern: '(?i)(private[_\-]?key|privatekey)\s*[:=]\s*["\x27]?([a-zA-Z0-9+/=_\-]{30,})'
    severity: critical
    entropy_min: 4.0
    guidance: "Private key value found — identify the service and rotate."

  - id: connection_string
    service: generic
    pattern: '(?i)(?:mongodb|postgres|postgresql|mysql|redis|amqp)://[^@\s]+:[^@\s]+@'
    severity: critical
    guidance: "Database/service connection string with embedded credentials — rotate the password and update the connection string."

  - id: ssh_private_key_content
    service: generic
    pattern: '-----BEGIN OPENSSH PRIVATE KEY-----'
    severity: critical
    guidance: "OpenSSH private key — remove from repository and rotate any servers using the corresponding public key."

# Entropy-only catch-all (no specific pattern match)
# Run against unmatched high-entropy strings in .env files
high_entropy:
  - charset: base64
    min_length: 32
    max_length: 100
    min_entropy: 4.8
    severity: medium
    guidance: "High-entropy string — may be a secret. Verify and rotate if so."

  - charset: hex
    min_length: 32
    max_length: 64
    min_entropy: 3.5
    severity: low
    guidance: "High-entropy hex string — may be a key or hash. Verify context."
