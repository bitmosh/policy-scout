name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package editable
        run: |
          pip install -e ".[dev]"

      - name: Run doctor diagnostics
        run: |
          python -m policy_scout.cli.main doctor --json

      - name: Run evaluation suite
        run: |
          python -m policy_scout.cli.main eval run

      - name: Run pytest
        run: |
          python -m pytest

  tauri-desktop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        working-directory: ui/desktop
        run: npm ci

      - name: Build frontend (tsc + vite)
        working-directory: ui/desktop
        run: npm run build

      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        working-directory: ui/desktop/src-tauri
        run: cargo check

      - name: cargo test
        working-directory: ui/desktop/src-tauri
        run: cargo test
